<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NanoBob · 下一代 AI 工作台</title>
    <meta name="description" content="NanoBob 是下一代 AI 工作台，集成 AI 无限画布与圆桌论坛，支持多模型并发对话、分支推演和联网搜索。" />
    <meta name="keywords" content="NanoBob,AI工作台,无限画布,圆桌论坛,多模型对话,AI协作,大模型,LLM" />
    <meta property="og:title" content="NanoBob · 下一代 AI 工作台" />
    <meta property="og:description" content="多模型并发对话、分支推演、联网搜索，尽在一张无限画布。" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NanoBob · 下一代 AI 工作台" />
    <meta name="twitter:description" content="多模型并发对话、分支推演、联网搜索，尽在一张无限画布。" />
    <link rel="canonical" href="/app" />
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
          <img src="/static/logo.svg" alt="NanoBob" class="sidebar-logo" />
          <span class="sidebar-title">NanoBob</span>
          <button id="sidebarCollapseBtn" type="button" class="sidebar-collapse-btn" title="收起侧栏">◁</button>
        </div>
        <div class="sidebar-canvas-section">
          <button id="sidebarNewCanvasBtn" type="button" class="sidebar-new-canvas-btn">＋ 新建画布</button>
          <div id="sidebarCanvasList" class="sidebar-canvas-list"></div>
        </div>
        <div class="sidebar-account">
          <div class="sidebar-avatar" id="sidebarAvatar">?</div>
          <div class="sidebar-user-info">
            <span id="sidebarUsername" class="sidebar-username">--</span>
            <span id="sidebarBalance" class="sidebar-balance">-- 点</span>
          </div>
          <div class="sidebar-account-actions">
            <a href="/settings" class="sidebar-action-btn" title="设置">&#9881;</a>
            <button id="sidebarLogoutBtn" type="button" class="sidebar-action-btn" title="退出登录">&#9211;</button>
          </div>
        </div>
      </aside>

      <header class="topbar">
        <div class="topbar-left-minimal">
          <button id="sidebarToggleBtn" type="button" class="tool-btn sidebar-toggle-btn" title="展开侧栏">&#9776;</button>
        </div>
        <div class="topbar-right">
          <div class="zoom-tools">
            <button id="zoomOutBtn" type="button" class="tool-btn" title="缩小">－</button>
            <button id="zoomResetBtn" type="button" class="tool-btn zoom-pill" title="重置缩放">100%</button>
            <button id="zoomInBtn" type="button" class="tool-btn" title="放大">＋</button>
          </div>
          <span id="status" class="status">连接中...</span>
          <button id="fitBtn" type="button" class="tool-btn">回到当前对话</button>
          <button id="clearBtn" type="button" class="tool-btn">清空画布</button>
        </div>
      </header>

      <main class="workspace">
        <div id="canvasViewport" class="canvas-viewport">
          <div class="canvas-grid"></div>
          <svg id="edgeLayer" class="edge-layer" aria-hidden="true"></svg>
          <div id="canvasStage" class="canvas-stage"></div>
          <div id="selectionActions" class="selection-actions hidden">
            <div id="selectionModeSegment" class="seg-control hidden" role="tablist" aria-label="模型选择模式">
              <button id="selectionModeQuote" type="button" class="seg-btn active" role="tab" aria-selected="true" title="把当前回答作为上下文，让所有模型继续讨论">📤 引用到所有模型</button>
              <button id="selectionModeBranch" type="button" class="seg-btn" role="tab" aria-selected="false" title="只用当前模型继续延展，不打扰其他模型">⎇ 仅此模型</button>
            </div>
            <button id="selectionContinueBtn" type="button" class="small-btn">继续讨论</button>
            <button id="selectionBranchBtn" type="button" class="small-btn">建立分支</button>
            <button id="selectionClearBtn" type="button" class="small-btn">清除选择</button>
          </div>
          <div id="needsSetupBanner" class="needs-setup-banner hidden">
            <span>管理员尚未完成模型配置，暂时无法使用对话功能，请联系管理员。</span>
          </div>
          <aside id="minimap" class="minimap">
            <div class="minimap-title">Map</div>
            <div id="minimapContent" class="minimap-content">
              <div id="minimapNodes" class="minimap-nodes"></div>
              <div id="minimapViewport" class="minimap-viewport"></div>
            </div>
          </aside>
        </div>
      </main>

      <footer class="composer-shell">
        <div class="composer-meta compact-meta">
          <div class="compact-controls">
            <label class="control inline-control">
              <span>讨论轮数</span>
              <select id="discussionRounds">
                <option value="1">1 轮</option>
                <option value="2" selected>2 轮</option>
                <option value="3">3 轮</option>
                <option value="4">4 轮</option>
              </select>
            </label>
            <label class="control inline-control">
              <span>联网</span>
              <select id="searchToggle">
                <option value="auto" selected>自动</option>
                <option value="true">开</option>
                <option value="false">关</option>
              </select>
            </label>
            <label class="toggle-pill">
              <input id="thinkToggle" type="checkbox" />
              <span>思考</span>
            </label>
          </div>
          <div class="composer-meta-right">
            <span id="composerMode" class="mode-pill">普通提问</span>
            <span id="saveStatus" class="save-status hidden"></span>
            <span id="roundHint" class="muted">联网「自动」由预处理模型判断；思考开启后会更注重验证与分析。</span>
          <span id="conclusionHint" class="conclusion-hint hidden"></span>
          </div>
        </div>
        <div id="selectedChips" class="selected-chips hidden"></div>
        <section id="selectionSummary" class="selection-summary hidden">
          <div class="selection-summary-head">
            <span id="selectionSummaryCount" class="selection-summary-count">已圈选 0 个节点</span>
            <span id="selectionSummaryModel" class="selection-summary-model">Kimi 总结</span>
          </div>
          <div id="selectionSummaryText" class="selection-summary-text"></div>
        </section>
        <div class="composer compact-composer">
          <textarea id="messageInput" rows="1" placeholder="输入消息，Ctrl/Cmd + Enter 发送"></textarea>
          <button id="sendBtn" type="button" class="primary-btn">发送</button>
        </div>
      </footer>
    </div>

    <script src="/static/markdown.js"></script>
    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>
