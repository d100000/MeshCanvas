          <path d="M 60 80 C 150 120, 250 60, 340 100" stroke="rgba(123,38,232,0.10)" stroke-width="1.5" stroke-dasharray="5 5" fill="none"/>
          <path d="M 420 90 C 380 200, 200 280, 80 360" stroke="rgba(123,38,232,0.07)" stroke-width="1.5" stroke-dasharray="7 4" fill="none"/>
          <path d="M 500 350 C 400 300, 300 380, 180 320" stroke="rgba(169,107,240,0.08)" stroke-width="1" stroke-dasharray="4 6" fill="none"/>
        </svg>

        <!-- L4: 主内容 -->

                <g id="hero-mouth"><rect x="90" y="130" width="25" height="3" fill="#1a1a1a"/><rect x="88" y="128" width="3" height="3" fill="#1a1a1a"/><rect x="114" y="128" width="3" height="3" fill="#1a1a1a"/></g>

          <div class="login-area-footer">

      <!-- ─── 右侧表单 ─── -->
      <section class="auth-form-side">
        <section class="auth-card">
          <div class="auth-brand">
            <span class="auth-badge">Secure Access</span>
            <h1>欢迎回来</h1>
            <p>登录或注册，进入下一代 AI 工作台。</p>
          </div>

          <div class="auth-tabs" role="tablist" aria-label="登录或注册">
            <button type="button" class="auth-tab active" data-auth-tab="login" aria-selected="true">登录</button>
            <button type="button" class="auth-tab" data-auth-tab="register" aria-selected="false">注册</button>
          </div>

          <section class="auth-panel-shell">
            <form id="loginForm" class="auth-form" data-auth-panel="login">
              <label class="auth-field">
                <span>用户名</span>
                <input name="username" type="text" autocomplete="username" maxlength="32" required />
              </label>
              <label class="auth-field">
                <span>密码</span>
                <input name="password" type="password" autocomplete="current-password" maxlength="128" required />
              </label>
              <div class="auth-captcha">
                <label class="auth-field">
                  <span class="captcha-label">验证码：<strong class="captcha-question" data-captcha-q></strong><button type="button" class="captcha-refresh" data-captcha-refresh title="换一道题">&#x21bb;</button></span>
                  <input name="captcha_answer" type="text" inputmode="numeric" maxlength="6" autocomplete="off" required placeholder="请输入计算结果" />
                </label>
                <input type="hidden" name="captcha_token" data-captcha-token />
              </div>
              <div class="auth-hp" aria-hidden="true">
                <input name="website" tabindex="-1" autocomplete="off" />
              </div>
              <button type="submit" class="primary-btn auth-submit">登录</button>
            </form>

            <form id="registerForm" class="auth-form hidden" data-auth-panel="register">
              <label class="auth-field">
                <span>用户名</span>
                <input name="username" type="text" autocomplete="username" maxlength="32" required />
              </label>
              <label class="auth-field">
                <span>密码</span>
                <input name="password" type="password" autocomplete="new-password" maxlength="128" required />
              </label>
              <div class="auth-captcha">
                <label class="auth-field">
                  <span class="captcha-label">验证码：<strong class="captcha-question" data-captcha-q></strong><button type="button" class="captcha-refresh" data-captcha-refresh title="换一道题">&#x21bb;</button></span>
                  <input name="captcha_answer" type="text" inputmode="numeric" maxlength="6" autocomplete="off" required placeholder="请输入计算结果" />
                </label>
                <input type="hidden" name="captcha_token" data-captcha-token />
              </div>
              <div class="auth-hp" aria-hidden="true">
                <input name="website" tabindex="-1" autocomplete="off" />
              </div>
              <button type="submit" class="primary-btn auth-submit">注册并进入</button>
            </form>
          </section>

          <div id="authMessage" class="auth-message" aria-live="polite"></div>
          <p class="auth-note">用户名支持字母、数字、点、下划线和短横线；密码至少 8 位。</p>
          <p class="auth-note"><a href="/" class="auth-link">← 返回首页</a></p>
        </section>
      </section>
    </main>
    <script src="/static/auth.js"></script>
  </body>
</html>
