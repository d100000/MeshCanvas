<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设置 · 无限画布多模型聊天室</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card setup-card">
        <div class="auth-brand">
          <span class="auth-badge">Settings</span>
          <h1>API 与搜索设置</h1>
          <p>配置你自己的大模型 API 和联网搜索能力，仅对当前账号生效。</p>
        </div>

        <form id="settingsForm" class="setup-form">
          <fieldset class="settings-group">
            <legend>大模型 API</legend>
            <label class="auth-field">
              <span>API 地址</span>
              <input name="api_base_url" type="url" placeholder="https://api.openai.com/v1" required />
            </label>
            <label class="auth-field">
              <span>API 格式</span>
              <select name="api_format">
                <option value="openai" selected>OpenAI</option>
                <option value="anthropic">Anthropic</option>
              </select>
            </label>
            <label class="auth-field">
              <span>API Key<span id="apiKeyHint" class="settings-key-hint"></span></span>
              <input name="api_key" type="password" placeholder="留空则保持不变" />
            </label>
            <div class="setup-models-section">
              <div class="setup-models-header">
                <span>模型列表</span>
                <button type="button" id="addModelBtn" class="small-btn">＋ 添加模型</button>
              </div>
              <div class="setup-model-labels">
                <span>显示名称</span>
                <span>模型 ID</span>
                <span></span>
              </div>
              <div id="modelList" class="setup-model-list"></div>
            </div>
          </fieldset>

          <fieldset class="settings-group">
            <legend>联网搜索（Firecrawl）</legend>
            <label class="auth-field">
              <span>Firecrawl API Key<span id="fcKeyHint" class="settings-key-hint"></span></span>
              <input name="firecrawl_api_key" type="password" placeholder="留空则保持不变；不填则禁用联网搜索" />
            </label>
            <div class="settings-row">
              <label class="auth-field">
                <span>国家代码</span>
                <input name="firecrawl_country" type="text" value="CN" maxlength="4" />
              </label>
              <label class="auth-field">
                <span>超时（毫秒）</span>
                <input name="firecrawl_timeout_ms" type="number" value="45000" min="5000" max="120000" />
              </label>
            </div>
          </fieldset>

          <div class="settings-actions">
            <a href="/" class="small-btn settings-back">← 返回画布</a>
            <button type="submit" class="primary-btn auth-submit">保存设置</button>
          </div>
        </form>

        <div id="settingsMessage" class="auth-message" aria-live="polite"></div>
      </section>
    </main>
    <script src="/static/settings.js"></script>
  </body>
</html>
