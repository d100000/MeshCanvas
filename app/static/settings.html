<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账号与用量 · NanoBob</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="auth-body">
    <main class="settings-shell">
      <section class="settings-card">
        <div class="auth-brand">
          <img src="/static/logo.svg" alt="NanoBob" class="auth-logo" />
          <span class="auth-badge">账号</span>
          <h1>账号与用量</h1>
          <p id="accountInfo" class="settings-account-info">加载中…</p>
        </div>

        <div class="settings-summary-grid" id="usageSummary">
          <div class="settings-stat-card">
            <div class="settings-stat-label">今日消耗</div>
            <div class="settings-stat-value" id="sumToday">--</div>
            <div class="settings-stat-sub" id="sumTodayCount">-- 次调用</div>
          </div>
          <div class="settings-stat-card">
            <div class="settings-stat-label">近 7 天</div>
            <div class="settings-stat-value" id="sumWeek">--</div>
            <div class="settings-stat-sub" id="sumWeekCount">-- 次调用</div>
          </div>
          <div class="settings-stat-card">
            <div class="settings-stat-label">历史总量</div>
            <div class="settings-stat-value" id="sumTotal">--</div>
            <div class="settings-stat-sub" id="sumTotalCount">-- 次调用</div>
          </div>
          <div class="settings-stat-card">
            <div class="settings-stat-label">当前余额</div>
            <div class="settings-stat-value settings-balance" id="sumBalance">--</div>
          </div>
        </div>

        <div class="settings-section">
          <h3>用量明细</h3>
          <div class="settings-table-wrap">
            <table class="settings-table" id="usageTable">
              <thead>
                <tr>
                  <th>时间</th>
                  <th>模型</th>
                  <th>输入 tokens</th>
                  <th>输出 tokens</th>
                  <th>响应时间</th>
                  <th>积分消耗</th>
                </tr>
              </thead>
              <tbody id="usageTableBody">
                <tr><td colspan="6" class="settings-muted">加载中…</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="settings-section">
          <h3>自定义 API Key</h3>
          <div class="settings-key-notice">
            <span>仅支持 bobdong.cn 站点的 Key</span>
            <a href="https://bobdong.cn" target="_blank" rel="noreferrer" class="settings-key-link">前往获取 →</a>
          </div>

          <div class="settings-form-row">
            <label class="settings-label">
              <span>计费模式</span>
              <select id="billingMode">
                <option value="points">使用积分</option>
                <option value="custom">使用自定义 API Key</option>
              </select>
            </label>
          </div>

          <div id="userApiInfo" class="settings-key-status"></div>

          <div id="modelKeysSection" class="settings-model-keys hidden">
            <h4>按模型配置 API Key</h4>
            <div id="modelKeysList" class="settings-model-keys-list"></div>
          </div>

          <div class="settings-form-row">
            <button id="saveCustomKeyBtn" class="small-btn primary-btn">保存设置</button>
            <button id="clearCustomKeyBtn" class="small-btn">清除所有自定义 Key</button>
          </div>
          <div id="customKeyMsg" class="settings-msg"></div>
          <p class="settings-hint">切换计费模式或保存 Key 后，需刷新画布页面才能生效。</p>
        </div>

        <div class="settings-readonly-note">
          <p>大模型列表和联网搜索由管理员统一配置。如需调整，请联系管理员。</p>
        </div>

        <div class="settings-actions">
          <a href="/app" class="small-btn settings-back">← 返回画布</a>
        </div>
      </section>
    </main>
    <script src="/static/settings.js"></script>
  </body>
</html>
