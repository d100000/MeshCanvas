<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设置 · 无限画布多模型聊天室</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card setup-card">
        <div class="auth-brand">
          <span class="auth-badge">Settings</span>
          <h1>用户设置</h1>
          <p>查看当前配置信息和修改密码。</p>
        </div>

        <fieldset class="settings-group" id="configInfo">
          <legend>当前配置（只读）</legend>
          <div class="settings-info-grid">
            <div class="settings-info-item">
              <span class="settings-info-label">API 地址</span>
              <span class="settings-info-value" id="infoBaseUrl">-</span>
            </div>
            <div class="settings-info-item">
              <span class="settings-info-label">API 格式</span>
              <span class="settings-info-value" id="infoApiFormat">-</span>
            </div>
            <div class="settings-info-item">
              <span class="settings-info-label">API Key</span>
              <span class="settings-info-value" id="infoApiKey">-</span>
            </div>
            <div class="settings-info-item">
              <span class="settings-info-label">模型列表</span>
              <span class="settings-info-value" id="infoModels">-</span>
            </div>
            <div class="settings-info-item">
              <span class="settings-info-label">联网搜索</span>
              <span class="settings-info-value" id="infoSearch">-</span>
            </div>
          </div>
          <p class="auth-note" style="margin-top:8px">配置由管理员统一管理。如需修改，请编辑服务端配置文件或运行 <code>python -m app.init_db --reset</code> 重新初始化。</p>
        </fieldset>

        <form id="passwordForm" class="setup-form">
          <fieldset class="settings-group">
            <legend>修改密码</legend>
            <label class="auth-field">
              <span>当前密码</span>
              <input name="old_password" type="password" placeholder="输入当前密码" required />
            </label>
            <label class="auth-field">
              <span>新密码</span>
              <input name="new_password" type="password" placeholder="至少 8 位" minlength="8" maxlength="128" required />
            </label>
            <label class="auth-field">
              <span>确认新密码</span>
              <input name="confirm_password" type="password" placeholder="再次输入新密码" minlength="8" maxlength="128" required />
            </label>
          </fieldset>

          <div class="settings-actions">
            <a href="/" class="small-btn settings-back">&larr; 返回画布</a>
            <button type="submit" class="primary-btn auth-submit">修改密码</button>
          </div>
        </form>

        <div id="settingsMessage" class="auth-message" aria-live="polite"></div>
      </section>
    </main>
    <script src="/static/settings.js"></script>
  </body>
</html>
