<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>初始配置 · 无限画布多模型聊天室</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell">
      <section class="auth-card setup-card">
        <div class="auth-brand">
          <span class="auth-badge">Initial Setup</span>
          <h1>初始配置</h1>
          <p>首次使用，请配置管理员账号、大模型 API 连接信息和搜索服务。</p>
        </div>

        <form id="setupForm" class="setup-form">
          <fieldset class="settings-group">
            <legend>管理员账号</legend>
            <label class="auth-field">
              <span>管理员用户名</span>
              <input name="admin_username" type="text" placeholder="admin" value="admin" maxlength="32" required />
            </label>
            <label class="auth-field">
              <span>管理员密码</span>
              <input name="admin_password" type="password" placeholder="至少 8 位" maxlength="128" required />
            </label>
          </fieldset>

          <fieldset class="settings-group">
            <legend>大模型 API</legend>
            <label class="auth-field">
              <span>API 地址</span>
              <input name="base_url" type="url" placeholder="https://api.openai.com/v1" required />
            </label>
            <label class="auth-field">
              <span>API 格式</span>
              <select name="api_format">
                <option value="openai" selected>OpenAI</option>
                <option value="anthropic">Anthropic</option>
              </select>
            </label>
            <label class="auth-field">
              <span>API Key</span>
              <input name="API_key" type="password" placeholder="sk-..." required />
            </label>
            <div class="setup-models-section">
              <div class="setup-models-header">
                <span>模型列表</span>
                <button type="button" id="addModelBtn" class="small-btn">＋ 添加模型</button>
              </div>
              <div class="setup-model-labels">
                <span>显示名称</span>
                <span>模型 ID（实际请求 API 用）</span>
                <span></span>
              </div>
              <div id="modelList" class="setup-model-list"></div>
            </div>
          </fieldset>

          <fieldset class="settings-group">
            <legend>联网搜索（Firecrawl，可选）</legend>
            <label class="auth-field">
              <span>Firecrawl API Key</span>
              <input name="firecrawl_api_key" type="password" placeholder="fc-...（留空则禁用联网搜索）" />
            </label>
            <div class="settings-row">
              <label class="auth-field">
                <span>国家代码</span>
                <input name="firecrawl_country" type="text" value="CN" maxlength="4" />
              </label>
              <label class="auth-field">
                <span>超时（毫秒）</span>
                <input name="firecrawl_timeout_ms" type="number" value="45000" min="5000" max="120000" />
              </label>
            </div>
          </fieldset>

          <button type="submit" class="primary-btn auth-submit">保存并开始</button>
        </form>

        <div id="setupMessage" class="auth-message" aria-live="polite"></div>
        <p class="auth-note">配置完成后将创建管理员账号并初始化数据库，随后跳转到登录页面。<br>如需重新初始化，运行 <code>python -m app.init_db --reset</code></p>
      </section>
    </main>
    <script src="/static/setup.js"></script>
  </body>
</html>
